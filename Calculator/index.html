<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classic Calculator</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #1e1e1e, #3a3a3a);
      font-family: 'Segoe UI', sans-serif;
    }

    .calculator {
      background: #2c2c2c;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      width: 300px;
    }

    .display {
      background: #111;
      color: #0f0;
      font-size: 2rem;
      padding: 15px;
      border-radius: 10px;
      text-align: right;
      margin-bottom: 15px;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
    }
    /* }172.31.61.148 */

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      padding: 15px;
      font-size: 1.2rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
      background: #444;
      color: white;
      box-shadow: 0 4px #222;
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 2px #222;
    }

    .operator {
      background: #ff9500;
    }

    .equal {
      background: #28a745;
      grid-column: span 2;
    }

    .clear {
      background: #dc3545;
      grid-column: span 2;
    }
  </style>
</head>
<body>

<div class="calculator">
  <div id="display" class="display">0</div>
  <div class="buttons">
    <button onclick="clearDisplay()" class="clear">C</button>
    <button onclick="append('/')" class="operator">/</button>
    <button onclick="append('*')" class="operator">*</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button onclick="append('-')" class="operator">-</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button onclick="append('+')" class="operator">+</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button onclick="append('%')">%</button>

    <button onclick="calculate()" class="equal">=</button>

    <button onclick="append('0')">0</button>
    <!-- <button onclick="append('%')">%</button> -->
    <button onclick="append('.')">.</button>
  </div>
</div>

<script>
  let display = document.getElementById('display');

  function append(value) {
    if (display.innerText === '0') {
      display.innerText = value;
    } else {
      display.innerText += value;
    }
  }

  function clearDisplay() {
    display.innerText = '0';
  }

  function calculate() {
    try {
      display.innerText = eval(display.innerText);
    } catch {
      display.innerText = 'Error';
    }
  }

  function calculate() {
  try {
    let expression = display.innerText;

    // 100 + 10% → 100 + 10
    expression = expression.replace(/(\d+)([+\-*/])(\d+)%/g, (match, num1, op, num2) => {
      let percentValue = (num1 * num2) / 100;
      return num1 + op + percentValue;
    });

    // 50% → 0.5
    expression = expression.replace(/(\d+)%/g, (match, num) => {
      return num / 100;
    });

    display.innerText = eval(expression);
  } catch {
    display.innerText = "Error";
  }
}
</script>

</body>
</html>
